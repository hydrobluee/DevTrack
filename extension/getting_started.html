<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevTrack Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style2.css">
</head>
<body>

<div class="container">
    <div class="intro">
        <img src="DevTrack nobg.png"  />
        <div style="display: flex;">
            <h2 class="title">Boost your STREAK</h2>
            <!-- <p>32 Days</p> -->
        </div>
        <div style="justify-content: center; margin-left: 10px; margin-right: 10px;">
            <img src="settings.png" style="height: 20px; width: 20px;"/>
        </div>
    </div>
  <div class="progress-wrapper">
    <div class="progress-ring">
      <span>17</span>
    </div>
  </div>

  <div class="difficulty">
    <div class="card easy">
      <p>Easy</p>
      <h3>12</h3>
    </div>
    <div class="card medium">
      <p>Medium</p>
      <h3>5</h3>
    </div>
    <div class="card hard">
      <p>Hard</p>
      <h3>0</h3>
    </div>
  </div>

  <div class="weekly">
  <p>Weekly Progress</p>

  <div class="days">
    <div class="day-item">
      <img src="streak nobg.png" />
      <!-- <span class="day active"></span> -->
      <span class="label">M</span>
    </div>

    <div class="day-item">
      <img src="streak nobg.png" />      
      <span class="label">T</span>
    </div>

    <div class="day-item">
      <img src="streak nobg.png" />
      <span class="label">W</span>
    </div>

    <div class="day-item">
      <img src="streak nobg.png" />
      <span class="label">T</span>
    </div>

    <div class="day-item">
      <img src="streak nobg.png" />
      <span class="label">F</span>
    </div>

    <div class="day-item">
      <span class="day"></span>
      <span class="label">S</span>
    </div>

    <div class="day-item">
      <span class="day"></span>
      <span class="label">S</span>
    </div>
  </div>
</div>
</div>
  <a href="http://localhost:5173/" class="summary">Check full summary &nearr;</a>
</div>

</body>
</html>
